<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 10th Anniversary</title>
    <style>
        :root {
            --reddish-purple: #6b1d3f;      /* Deep, rich reddish-purple base */
            --light-purple-bg: #f5edf1;     /* Soft tinted background */
            --silver-solid: #b0b7bd;       /* Classic silver for structural borders */
            --silver-glow: 0 0 15px rgba(192, 192, 192, 0.6); /* Vibrant silver highlight glow */
            --text-main: #2b1a22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--light-purple-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-wrapper {
            background: #ffffff;
            max-width: 550px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(107, 29, 63, 0.15), var(--silver-glow);
            border: 2px solid var(--silver-solid);
            text-align: center;
            padding: 40px 25px;
        }

        h1 {
            font-size: 2.3rem;
            color: var(--reddish-purple);
            margin-bottom: 8px;
            font-weight: normal;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            font-style: italic;
            color: #615057;
            margin-bottom: 25px;
            font-size: 1.05rem;
        }

        /* PHOTO SLIDESHOW FRAME */
        .slideshow-frame {
            position: relative;
            width: 100%;
            height: 380px; 
            margin: 0 auto 25px auto;
            background: #faf6f8;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--silver-solid);
            box-shadow: var(--silver-glow);
        }

        .slide-item {
            display: none;
            width: 100%;
            height: 100%;
        }

        .slide-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* Silver Highlight Controls */
        .arrow-btn {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ffffff, #e1e4e6);
            color: var(--reddish-purple);
            font-weight: bold;
            font-size: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: all 0.3s ease;
            border: 2px solid var(--silver-solid);
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .arrow-btn.left { left: 15px; }
        .arrow-btn.right { right: 15px; }

        .arrow-btn:hover {
            background: var(--reddish-purple);
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: var(--silver-glow);
        }

        .message-box {
            padding: 5px 10px;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .heart {
            color: var(--reddish-purple);
            font-size: 1.5rem;
            margin: 15px 0;
            text-shadow: 0 0 8px rgba(176, 183, 189, 0.8);
        }

        .indicator-container {
            margin-top: 15px;
        }

        .dot-nav {
            cursor: pointer;
            height: 10px;
            width: 10px;
            margin: 0 5px;
            background-color: var(--silver-solid);
            border-radius: 50%;
            display: inline-block;
            transition: all 0.4s;
        }

        .active-dot, .dot-nav:hover {
            background-color: var(--reddish-purple);
            transform: scale(1.2);
            box-shadow: var(--silver-glow);
        }
    </style>
</head>
<body>

<div class="card-wrapper">
    <h1>Happy 10th Anniversary</h1>
    <div class="subtitle">A decade of love, laughter, and beautiful memories</div>

<div class="slideshow-frame">
    <div class="slide-item"><img src="photo1.jpg" alt="Memory 1"></div>
    <div class="slide-item"><img src="photo2.jpg" alt="Memory 2"></div>
    <div class="slide-item"><img src="photo3.jpg" alt="Memory 3"></div>
    <div class="slide-item"><img src="photo4.jpg" alt="Memory 4"></div>
    <div class="slide-item"><img src="photo5.jpg" alt="Memory 5"></div>


        <span class="arrow-btn left" onclick="changeSlide(-1)">&#10094;</span>
        <span class="arrow-btn right" onclick="changeSlide(1)">&#10095;</span>
    </div>

    <div class="indicator-container">
        <span class="dot-nav" onclick="goToSlide(1)"></span>
        <span class="dot-nav" onclick="goToSlide(2)"></span>
        <span class="dot-nav" onclick="goToSlide(3)"></span>
        <span class="dot-nav" onclick="goToSlide(4)"></span>
        <span class="dot-nav" onclick="goToSlide(5)"></span>
    </div>

    <div class="heart">♥</div>

    <div class="message-box">
        <p>Ten years ago, we started a journey together. Through every step, building our home and growing our beautiful family, my love for you has only grown deeper.</p>
        <p style="margin-top: 15px; font-weight: bold; color: var(--reddish-purple);">Here's to a lifetime more.</p>
    </div>
</div>

<script>
    let currentIdx = 1;
    displaySlides(currentIdx);

    function changeSlide(n) {
        displaySlides(currentIdx += n);
    }

    function goToSlide(n) {
        displaySlides(currentIdx = n);
    }

    function displaySlides(n) {
        let i;
        let slides = document.getElementsByClassName("slide-item");
        let dots = document.getElementsByClassName("dot-nav");
        
        if (n > slides.length) {currentIdx = 1}    
        if (n < 1) {currentIdx = slides.length}
        
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
        }
        for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active-dot", "");
        }
        
        slides[currentIdx-1].style.display = "block";  
        dots[currentIdx-1].className += " active-dot";
    }
</script>

</body>
</html>
